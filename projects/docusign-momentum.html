<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuSign Momentum — Vidhi Bansal</title>
  <link rel="stylesheet" href="../project-page.css" />
  <style>
    .hero-media {
      padding: 0 2.5rem 1.5rem;
    }
    .hero-media img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    .gallery-subheading {
      margin: 0 0 0.9rem;
      padding: 0 2.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }
    .project-gallery:first-of-type .gallery-subheading {
      margin-top: 1.5rem;
    }
    .project-gallery {
      padding-top: 0;
      padding-bottom: 1.5rem;
    }
    .gallery-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: auto;
      gap: 6px;
    }
    .concept-renders-grid .gallery-item {
      height: 230px;
      overflow: hidden;
    }
    .concept-renders-grid .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-item {
      background: transparent;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }
    .site-images-grid {
      display: block;
      padding: 0 2.5rem;
    }
    .site-images-row {
      display: flex;
      gap: 6px;
      width: 100%;
      align-items: stretch;
      margin-bottom: 6px;
    }
    .site-images-row:last-child {
      margin-bottom: 0;
    }
    .site-images-row .gallery-item {
      flex: 0 0 auto;
      background: transparent;
    }
    .site-images-row .gallery-item img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }
    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .concept-renders-grid .gallery-item {
        height: 210px;
      }
    }
    @media (max-width: 560px) {
      .hero-media {
        padding: 0 1.5rem 1.2rem;
      }
      .gallery-subheading {
        padding: 0 1.5rem;
      }
      .gallery-grid {
        grid-template-columns: 1fr;
      }
      .site-images-grid {
        padding: 0 1.5rem;
      }
      .site-images-row {
        display: block;
      }
      .site-images-row .gallery-item {
        width: 100% !important;
        height: auto !important;
        margin-bottom: 6px;
      }
      .site-images-row .gallery-item:last-child {
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <a href="../experiential/index.html" class="back-link">← Back</a>

  <header class="project-header">
    <div class="project-header-left">
      <h1>DocuSign Momentum</h1>
      <p class="project-subtitle">Experience</p>
    </div>
    <div class="project-header-right">
      <p>Responsible for the 3D spatial concepting and design for the Docusign Momentum 2025 showcase space.</p>
    </div>
  </header>

  <section class="project-gallery">
    <h2 class="gallery-subheading">Concept Renders</h2>
    <div class="gallery-grid concept-renders-grid">
      <div class="gallery-item"><img src="../assets/Docusign MOmentum/RENDERS/Concept_01.PNG" alt="DocuSign Momentum concept render 1" loading="lazy" /></div>
      <div class="gallery-item"><img src="../assets/Docusign MOmentum/RENDERS/new-concept-03.png" alt="DocuSign Momentum concept render 2" loading="lazy" /></div>
      <div class="gallery-item"><img src="../assets/Docusign MOmentum/RENDERS/03 (4).jpg" alt="DocuSign Momentum concept render 3" loading="lazy" /></div>
      <div class="gallery-item"><img src="../assets/Docusign MOmentum/RENDERS/new-concept-01.png" alt="DocuSign Momentum concept render 4" loading="lazy" /></div>
      <div class="gallery-item"><img src="../assets/Docusign MOmentum/RENDERS/new-concept-04.png" alt="DocuSign Momentum concept render 5" loading="lazy" /></div>
      <div class="gallery-item"><img src="../assets/Docusign MOmentum/RENDERS/02 (1).jpg" alt="DocuSign Momentum concept render 6" loading="lazy" /></div>
    </div>
  </section>

  <section class="project-gallery">
    <h2 class="gallery-subheading">Site Images</h2>
    <div class="site-images-grid">
      <div class="site-images-row" data-site-row>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07282.jpg" alt="DocuSign Momentum site image 1" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07748.jpg" alt="DocuSign Momentum site image 2" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07758.jpg" alt="DocuSign Momentum site image 3" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07863.jpg" alt="DocuSign Momentum site image 4" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07983.jpg" alt="DocuSign Momentum site image 5" loading="lazy" /></div>
      </div>
      <div class="site-images-row" data-site-row>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07984.jpg" alt="DocuSign Momentum site image 6" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07985.jpg" alt="DocuSign Momentum site image 7" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC07992.jpg" alt="DocuSign Momentum site image 8" loading="lazy" /></div>

        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC08012.jpg" alt="DocuSign Momentum site image 13" loading="lazy" /></div>

        <div class="gallery-item"><img src="../assets/Docusign MOmentum/DSC08036.jpg" alt="DocuSign Momentum site image 15" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Docusign MOmentum/WhatsApp Image 2025-05-02 at 6.42.20 PM.jpeg" alt="DocuSign Momentum site image 16" loading="lazy" /></div>
      </div>
    </div>
  </section>

  <script>
    (function () {
      function justifySiteRows() {
        var rows = document.querySelectorAll('[data-site-row]');
        rows.forEach(function (row) {
          var items = Array.from(row.querySelectorAll('.gallery-item'));
          if (!items.length) return;

          if (window.innerWidth <= 560) return;

          var rowWidth = row.clientWidth;
          var gap = 6;
          var aspectSum = 0;

          items.forEach(function (item) {
            var img = item.querySelector('img');
            var ar = 1;
            if (img && img.naturalWidth && img.naturalHeight) {
              ar = img.naturalWidth / img.naturalHeight;
            }
            aspectSum += ar;
            item.dataset.ar = String(ar);
          });

          if (!aspectSum) return;

          var rowHeight = Math.max(120, (rowWidth - gap * (items.length - 1)) / aspectSum);
          items.forEach(function (item) {
            var ar = Number(item.dataset.ar || 1);
            item.style.width = (rowHeight * ar) + 'px';
            item.style.height = rowHeight + 'px';
          });
        });
      }

      function bind() {
        document.querySelectorAll('[data-site-row] img').forEach(function (img) {
          img.addEventListener('load', justifySiteRows);
        });
      }

      window.addEventListener('load', function () {
        bind();
        justifySiteRows();
      });
      window.addEventListener('resize', justifySiteRows);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Tommy Hilfiger — Vidhi Bansal</title>
  <link rel="stylesheet" href="../project-page.css" />
  <style>
    :root {
      --tommy-scale: 70%;
      --tommy-gap: 6px;
    }
    .tommy-gallery {
      display: grid;
      gap: var(--tommy-gap);
      width: var(--tommy-scale);
      margin: 0 auto 1.5rem;
      padding: 1.2rem 0;
    }
    .tommy-row-wide {
      display: grid;
      grid-template-columns: 1fr;
    }
    .tommy-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--tommy-gap);
    }
    .tommy-row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--tommy-gap);
      max-width: 100%;
      margin: 0;
    }
    .tommy-gallery .gallery-item {
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
    }
    .tommy-gallery .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tommy-gallery .gallery-item:hover img {
      transform: scale(1.04);
    }
    .tommy-row-wide .gallery-item {
      aspect-ratio: 1900 / 996;
    }
    .tommy-row-3 .gallery-item {
      aspect-ratio: 964 / 1452;
    }
    .tommy-row-2 .gallery-item {
      aspect-ratio: 864 / 1080;
    }
    @media (max-width: 700px) {
      :root { --tommy-scale: 100%; }
      .tommy-row-3 { grid-template-columns: 1fr 1fr; }
      .tommy-row-2 { max-width: 100%; }
      .tommy-gallery { padding: 1rem 1.5rem; }
      .video-section { padding: 0 1.5rem; }
    }
    @media (max-width: 480px) {
      .tommy-row-3 { grid-template-columns: 1fr; }
      .tommy-row-2 { grid-template-columns: 1fr; }
    }
    .video-section {
      padding: 0;
      width: var(--tommy-scale);
      margin: 0 auto 2rem;
      margin-bottom: 2rem;
    }
    .video-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--tommy-gap);
      margin-bottom: var(--tommy-gap);
    }
    .video-row.two-up {
      grid-template-columns: repeat(2, 1fr);
    }
    .project-video {
      width: 100%;
      display: block;
      background: #000;
      margin-bottom: 0;
    }
    .video-row:last-child {
      margin-bottom: 0;
    }
    @media (max-width: 700px) {
      .video-row.two-up {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

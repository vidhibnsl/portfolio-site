<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocket CAVS — Vidhi Bansal</title>
  <link rel="stylesheet" href="../project-page.css" />
  <style>
    .gallery-subheading {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin: 2rem 0 1rem;
      padding: 0 2.5rem;
    }
    .rocket-superbowl-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: auto;
      gap: 6px;
    }
    .rocket-superbowl-grid .gallery-item {
      background: transparent;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rocket-superbowl-grid .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .rocket-superbowl-grid .gallery-item.featured {
      grid-column: 1 / -1;
      height: 380px;
      max-width: 78%;
      justify-self: center;
    }
    .rocket-superbowl-video {
      width: 70%;
      display: block;
      background: #000;
      margin: 10px auto 0;
      border-radius: 12px;
    }
    .video-subheading {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      margin: 1.2rem 0 0.4rem;
      text-align: center;
    }
    .rocket-tigers-experience-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: auto;
    }
    .rocket-tigers-experience-grid .gallery-item {
      background: transparent;
    }
    .rocket-tigers-experience-grid .gallery-item img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }
    @media (max-width: 600px) {
      .gallery-subheading {
        padding: 0 1.5rem;
      }
      .rocket-superbowl-grid {
        grid-template-columns: 1fr;
      }
      .rocket-superbowl-grid .gallery-item {
        height: auto;
      }
      .rocket-superbowl-grid .gallery-item img {
        width: 100%;
        height: auto;
      }
      .rocket-superbowl-grid .gallery-item.featured {
        max-width: 100%;
      }
      .rocket-superbowl-video {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a href="../experiential/index.html" class="back-link">← Back</a>
  <header class="project-header">
    <div class="project-header-left">
      <h1>Rocket - SuperBowl Experience '26</h1>
      <p class="project-subtitle">Experience</p>
    </div>
    <div class="project-header-right">
      <p>Worked on 2D motion graphics and animatics for the main curved LED in the SuperBowl Rocket arena using assets provided by Rocket Companies in After Effects.</p>
    </div>
  </header>
  <h2 class="gallery-subheading">Rocket - SuperBowl</h2>
  <section class="project-gallery">
    <div class="gallery-grid rocket-superbowl-grid">
      <div class="gallery-item"><img src="../assets/Rocket Superbowl/rocket02.jpeg" alt="Rocket CAVS activation" loading="lazy" /></div>
      <div class="gallery-item"><img src="../assets/Rocket Superbowl/rocket-3.jpeg" alt="Rocket CAVS environment" loading="lazy" /></div>
      <div class="gallery-item featured"><img src="../assets/Rocket Superbowl/rocket01.jpeg" alt="Rocket CAVS" loading="lazy" /></div>
    </div>
    <p class="video-subheading">2D Motion Graphic renders</p>
    <video class="rocket-superbowl-video" autoplay loop muted playsinline preload="auto">
      <source src="../assets/Rocket Superbowl/BRAND_LEFT_V02.mp4" type="video/mp4" />
    </video>
    <video class="rocket-superbowl-video" autoplay loop muted playsinline preload="auto">
      <source src="../assets/Rocket Superbowl/RIGHT_Roary_v01.mp4" type="video/mp4" />
    </video>
    <video class="rocket-superbowl-video" autoplay loop muted playsinline preload="auto">
      <source src="../assets/Rocket Superbowl/SUPER_RIGHT_v03.mp4" type="video/mp4" />
    </video>
  </section>
  <script>
    setTimeout(function () {
      document.querySelectorAll('.rocket-superbowl-video').forEach(function (v) { v.play(); });
    }, 1000);
  </script>
</body>
</html>

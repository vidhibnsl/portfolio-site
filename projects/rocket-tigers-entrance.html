<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocket Tigers Entrance — Vidhi Bansal</title>
  <link rel="stylesheet" href="../project-page.css" />
  <style>
    .gallery-subheading {
      margin: 0 0 0.9rem;
      padding: 0 2.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }
    .project-gallery {
      padding-top: 0;
      padding-bottom: 1.5rem;
    }
    .concept-renders-section,
    .site-images-section {
      padding-left: 2.5rem;
      padding-right: 2.5rem;
    }
    .concept-renders-grid {
      display: block;
      padding: 0;
    }
    .concept-renders-row {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .concept-renders-row:last-child {
      margin-bottom: 0;
    }
    .concept-renders-row .gallery-item {
      flex: 1 1 0;
      height: auto;
    }
    .concept-renders-row .gallery-item img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }
    .concept-renders-row.is-centered-pair {
      justify-content: flex-start;
      width: 100%;
    }
    .concept-renders-row.is-centered-pair .gallery-item {
      flex: 1 1 0;
    }
    .concept-renders-row.is-centered-pair .gallery-item img {
      width: 100%;
      height: auto;
      max-width: none;
      object-fit: contain;
    }
    .concept-renders-row.is-centered-pair .gallery-item:nth-child(2) img {
      object-fit: cover;
    }
    .gallery-item {
      background: transparent;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }
    .site-images-grid {
      display: block;
      padding: 0;
    }
    .site-images-row {
      display: flex;
      gap: 6px;
      width: 100%;
      align-items: stretch;
      margin-bottom: 6px;
    }
    .site-images-row:last-child {
      margin-bottom: 0;
    }
    .site-images-row .gallery-item {
      background: transparent;
      flex: 0 0 auto;
    }
    .site-images-grid .gallery-item img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }
    @media (max-width: 900px) {
      .site-images-grid {
        padding: 0;
      }
    }
    @media (max-width: 768px) {
      .concept-renders-row,
      .site-images-row {
        display: block;
      }
      .concept-renders-row .gallery-item,
      .site-images-row .gallery-item {
        width: 100%;
        max-width: 100%;
        margin-bottom: 6px;
      }
      .concept-renders-row .gallery-item:last-child,
      .site-images-row .gallery-item:last-child {
        margin-bottom: 0;
      }
      .site-images-grid .gallery-item img {
        width: 100%;
        height: auto;
        object-fit: cover;
      }
    }
    @media (max-width: 560px) {
      .concept-renders-section,
      .site-images-section {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      .gallery-subheading {
        padding: 0 1.5rem;
      }
      .concept-renders-row .gallery-item {
        flex: 1 1 100%;
        height: auto;
      }
      .concept-renders-row .gallery-item img {
        height: auto;
      }
      .concept-renders-row.is-centered-pair .gallery-item img {
        width: 100%;
        height: auto;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <a href="../experiential/index.html" class="back-link">← Back</a>

  <header class="project-header">
    <div class="project-header-left">
      <h1>Rocket Tigers Entrance</h1>
      <p class="project-subtitle">Experience</p>
    </div>
    <div class="project-header-right">
      <p>Brand activation visuals and on-site execution imagery for the Rocket Tigers Entrance experience.</p>
    </div>
  </header>

  <section class="project-gallery concept-renders-section">
    <h2 class="gallery-subheading">Concept Renders</h2>
    <div class="concept-renders-grid">
      <div class="concept-renders-row">
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/renders/image01.png" alt="Rocket Tigers Entrance concept render 1" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/renders/image02.png" alt="Rocket Tigers Entrance concept render 2" loading="lazy" /></div>
      </div>
      <div class="concept-renders-row is-centered-pair">
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/renders/priorconceptrender01.png" alt="Rocket Tigers Entrance concept render 3" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/renders/priorconceptrender02.png" alt="Rocket Tigers Entrance concept render 4" loading="lazy" /></div>
      </div>
    </div>
  </section>

  <section class="project-gallery site-images-section">
    <h2 class="gallery-subheading">Site Images</h2>
    <div class="site-images-grid">
      <div class="site-images-row" data-justified-row>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/siteimage04.jpg" alt="Rocket Tigers Entrance site image 4" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/siteimage01.jpg" alt="Rocket Tigers Entrance site image 1" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/siteimage03.jpg" alt="Rocket Tigers Entrance site image 3" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/siteimage02.jpg" alt="Rocket Tigers Entrance site image 2" loading="lazy" /></div>
      </div>
      <div class="site-images-row" data-justified-row>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/siteimage05.jpg" alt="Rocket Tigers Entrance site image 5" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/siteimage06.jpg" alt="Rocket Tigers Entrance site image 6" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/rocket-tigers-site-15.png" alt="Rocket Tigers Entrance site image 7" loading="lazy" /></div>
        <div class="gallery-item"><img src="../assets/Rocket Tigers Entrance/rocket-tigers-site-16.png" alt="Rocket Tigers Entrance site image 8" loading="lazy" /></div>
      </div>
    </div>
  </section>

  <script>
    (function () {
      function applyJustifiedRows() {
        var rows = document.querySelectorAll('[data-justified-row]');
        rows.forEach(function (row) {
          var items = Array.from(row.querySelectorAll('.gallery-item'));
          if (!items.length) return;

          if (window.innerWidth <= 560) {
            row.style.display = 'block';
            items.forEach(function (item) {
              item.style.width = '100%';
              item.style.height = 'auto';
            });
            return;
          }

          row.style.display = 'flex';
          var rowWidth = row.clientWidth;
          var gap = 6;
          var aspectSum = 0;

          items.forEach(function (item) {
            var img = item.querySelector('img');
            var ar = 1;
            if (img && img.naturalWidth && img.naturalHeight) {
              ar = img.naturalWidth / img.naturalHeight;
            }
            aspectSum += ar;
            item.dataset.ar = String(ar);
          });

          if (!aspectSum) return;
          var targetHeight = Math.max(120, (rowWidth - gap * (items.length - 1)) / aspectSum);

          items.forEach(function (item) {
            var ar = Number(item.dataset.ar || 1);
            var w = targetHeight * ar;
            item.style.width = w + 'px';
            item.style.height = targetHeight + 'px';
          });
        });
      }

      function bindImages() {
        document.querySelectorAll('[data-justified-row] img').forEach(function (img) {
          img.addEventListener('load', applyJustifiedRows);
        });
      }

      window.addEventListener('load', function () {
        bindImages();
        applyJustifiedRows();
      });
      window.addEventListener('resize', applyJustifiedRows);
    })();
    (function () {
      function syncSecondRenderHeight() {
        var row = document.querySelector('.concept-renders-row.is-centered-pair');
        if (!row) return;
        var imgs = row.querySelectorAll('.gallery-item img');
        if (imgs.length < 2) return;

        var first = imgs[0];
        var second = imgs[1];

        if (window.innerWidth <= 560) {
          second.style.height = 'auto';
          second.style.objectFit = 'contain';
          return;
        }

        second.style.objectFit = 'cover';
        var firstHeight = first.getBoundingClientRect().height;
        if (firstHeight > 0) {
          second.style.height = firstHeight + 'px';
        }
      }

      window.addEventListener('load', syncSecondRenderHeight);
      window.addEventListener('resize', syncSecondRenderHeight);
      document.querySelectorAll('.concept-renders-row.is-centered-pair img').forEach(function (img) {
        img.addEventListener('load', syncSecondRenderHeight);
      });
    })();
  </script>
</body>
</html>

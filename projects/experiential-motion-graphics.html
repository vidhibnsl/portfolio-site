<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../project-page.css" />
  <style>
    .hero-loop {
      padding: 0 2.5rem 1.2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .hero-loop video {
      width: 100%;
      display: block;
      background: #000;
    }
    .motion-groups {
      padding: 0 2.5rem 2rem;
      display: grid;
      gap: 1.4rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .motion-group {
      text-align: center;
    }
    .motion-group-title {
      margin: 0 0 0.65rem;
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      line-height: 1.2;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }
    .motion-group.rocket-group .motion-group-title {
      margin-top: 0.8rem;
      transform: translateY(10%);
    }
    .motion-group-subtitle {
      margin: 0 0 0.8rem;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;
    }
    .motion-videos {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .motion-video {
      width: 100%;
      display: block;
      background: #000;
    }
    .motion-group.stack-videos .motion-videos {
      grid-template-columns: 1fr;
      justify-items: center;
    }
    .motion-group.stack-videos .motion-video {
      width: min(100%, calc(75% - 5px));
    }
    .motion-videos .motion-video:only-child {
      width: min(100%, calc(75% - 5px));
      justify-self: center;
    }
    .motion-videos .motion-video:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      width: min(100%, calc(75% - 5px));
      justify-self: center;
    }
    .motion-group.rocket-group .motion-videos .motion-video:last-child:nth-child(odd) {
      width: min(100%, calc(60% - 5px));
    }
    .motion-group.rocket-group .motion-videos {
      width: 120%;
      margin-left: -10%;
    }
    .motion-group.rocket-group .motion-videos {
      grid-template-columns: 1fr;
      width: 100%;
      margin-left: 0;
    }
    .motion-group.rocket-group .motion-video,
    .motion-group.rocket-group .motion-videos .motion-video:last-child:nth-child(odd) {
      width: min(100%, calc(75% - 5px));
      justify-self: center;
    }
    .motion-group.aws-group .motion-videos .motion-video:last-child:nth-child(odd) {
      width: min(100%, calc(50% - 5px));
    }
    @media (max-width: 768px) {
      .hero-loop {
        padding: 0 1.5rem 1rem;
      }
      .motion-groups {
        padding: 0 0.9rem 1.5rem;
      }
      .motion-videos {
        grid-template-columns: 1fr !important;
        gap: 8px;
      }
      .motion-group.stack-videos .motion-video,
      .motion-group.rocket-group .motion-video,
      .motion-group.rocket-group .motion-videos .motion-video:last-child:nth-child(odd),
      .motion-videos .motion-video:only-child,
      .motion-videos .motion-video:last-child:nth-child(odd),
      .motion-group.aws-group .motion-videos .motion-video:last-child:nth-child(odd) {
        width: 100%;
        justify-self: stretch;
      }
      .motion-video {
        width: 100%;
      }
      .motion-group.rocket-group .motion-videos {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

  <script>
    window.addEventListener('load', function () {
      document.querySelectorAll('.motion-video').forEach(function (v) {
        var p = v.play();
        if (p && typeof p.catch === 'function') p.catch(function () {});
      });

      // Videos with a start offset should always begin (and loop) from that offset.
      document.querySelectorAll('.motion-video[data-start-time]').forEach(function (v) {
        var start = Number(v.getAttribute('data-start-time') || 0);
        if (!Number.isFinite(start) || start <= 0) return;
        v.loop = false;

        var seekAndPlay = function () {
          try { v.currentTime = start; } catch (e) {}
          var p2 = v.play();
          if (p2 && typeof p2.catch === 'function') p2.catch(function () {});
        };

        if (v.readyState >= 1) seekAndPlay();
        v.addEventListener('loadedmetadata', seekAndPlay);
        v.addEventListener('ended', function () {
          seekAndPlay();
        });
      });
    });
  </script>

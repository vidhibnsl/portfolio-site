<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AI Cinematics — Under Construction</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .hold-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .hold-card {
      max-width: 780px;
    }
    .hold-title {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: none;
    }
    .hold-note {
      margin: 0.9rem 0 1.4rem;
      color: rgba(244, 243, 239, 0.72);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .hold-link {
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 243, 239, 0.45);
      padding-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <main class="hold-wrap">
    <section class="hold-card">
      <h1 class="hold-title">uh oh! this page is under construction</h1>
      <p class="hold-note">This portfolio section is being updated and will be live again soon.</p>
      <a class="hold-link" href="../index.html">Back to home</a>
    </section>
  </main>
</body>
</html>
